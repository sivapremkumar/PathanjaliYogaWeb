name: Deploy to Hostinger

# Auto-deployment workflow for Angular app to Hostinger FTP
# Updated: 2025-03-04 23:23

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: PathanjaliYogaWeb/package-lock.json
        
    - name: Install dependencies
      run: |
        cd PathanjaliYogaWeb
        npm ci
        
    - name: Build Angular app
      run: |
        cd PathanjaliYogaWeb
        npm run build -- --configuration production

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        tools: composer

    - name: Install PHP backend dependencies
      run: |
        cd PathanjaliYogaWeb/php-backend
        composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction --ignore-platform-reqs

        
    - name: Deploy to Hostinger via FTP
      env:
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: 89.117.27.43
        username: ${{ env.FTP_USERNAME }}
        password: ${{ env.FTP_PASSWORD }}
        local-dir: ./PathanjaliYogaWeb/dist/Yoga.Web/browser/
        server-dir: ./
        port: 21
        protocol: ftps
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/*.map
          api/**
          php-backend/**
          .well-known/**
        dangerous-clean-slate: false
        log-level: standard
        security: loose

    - name: Deploy PHP backend to /api
      env:
        FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
        FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: 89.117.27.43
        username: ${{ env.FTP_USERNAME }}
        password: ${{ env.FTP_PASSWORD }}
        local-dir: ./PathanjaliYogaWeb/php-backend/
        server-dir: ./api/
        port: 21
        protocol: ftps
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
        dangerous-clean-slate: false
        log-level: standard
        security: loose
