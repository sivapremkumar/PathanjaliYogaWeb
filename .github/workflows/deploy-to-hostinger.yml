name: Deploy to Hostinger

# Auto-deployment workflow for Angular app to Hostinger FTP
# Updated: 2025-03-04

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: PathanjaliYogaWeb/package-lock.json
        
    - name: Install dependencies
      run: |
        cd PathanjaliYogaWeb
        npm ci
        
    - name: Build Angular app
      run: |
        cd PathanjaliYogaWeb
        npm run build -- --configuration production
        
    - name: Deploy to Hostinger via FTP
      uses: SamKirkland/FTP-Deploy-Action@4.3.0
      with:
        server: 89.117.27.43
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./PathanjaliYogaWeb/dist/
        server-dir: /public_html/
        port: 21
        exclude: "*.map"
        log-level: standard
        security: standard
