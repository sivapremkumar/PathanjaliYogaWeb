<div class="animate-fade-in">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl font-bold">Board of Trustees</h2>
        <button (click)="showForm = !showForm" class="btn-primary shadow-xl shadow-primary/20">
            <lucide-icon [name]="Plus" size="20"></lucide-icon>
            Add Trustee
        </button>
    </div>

    <!-- Add Trustee Form -->
    <div *ngIf="showForm" class="bg-white rounded-[24px] p-8 shadow-sm border border-gray-100 mb-8 animate-fade-in">
        <h3 class="text-xl font-bold mb-6">New Trustee Details</h3>
        <form (ngSubmit)="addTrustee()" #trusteeForm="ngForm" class="space-y-6">
            <div class="grid md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Name</label>
                    <input type="text" [(ngModel)]="newTrustee.name" name="name" required
                        class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 focus:border-primary outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Role</label>
                    <input type="text" [(ngModel)]="newTrustee.role" name="role" required
                        class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 focus:border-primary outline-none transition-all">
                </div>
                <div class="md:col-span-2">
                    <label
                        class="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Description</label>
                    <textarea [(ngModel)]="newTrustee.description" name="description" rows="3" required
                        class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 focus:border-primary outline-none transition-all"></textarea>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Image
                        URL</label>
                    <input type="url" [(ngModel)]="newTrustee.imageUrl" name="imageUrl"
                        placeholder="https://content.example.com/image.jpg"
                        class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 focus:border-primary outline-none transition-all">
                </div>
            </div>
            <div class="flex justify-end gap-4 mt-8">
                <button type="button" (click)="showForm = false" class="btn-outline">Cancel</button>
                <button type="submit" [disabled]="!trusteeForm.valid" class="btn-primary">Save Trustee</button>
            </div>
        </form>
    </div>

    <!-- Trustees Grid -->
    <div class="grid md:grid-cols-2 gap-8">
        <div *ngFor="let t of trustees"
            class="bg-white rounded-[24px] p-6 shadow-sm border border-gray-100 flex gap-6 hover:shadow-md transition-shadow relative group">
            <div
                class="w-24 h-24 rounded-full bg-gray-100 flex-shrink-0 overflow-hidden border-4 border-white shadow-lg">
                <img *ngIf="t.imageUrl" [src]="t.imageUrl" class="w-full h-full object-cover">
                <div *ngIf="!t.imageUrl"
                    class="w-full h-full flex items-center justify-center text-gray-400 font-bold text-2xl">
                    {{t.name.charAt(0)}}
                </div>
            </div>
            <div class="flex-grow">
                <h3 class="text-xl font-bold text-gray-900">{{t.name}}</h3>
                <div class="text-sm font-bold text-primary mb-3">{{t.role}}</div>
                <p class="text-gray-500 text-sm line-clamp-2">{{t.description}}</p>
            </div>

            <button (click)="deleteTrustee(t.id)"
                class="absolute top-4 right-4 w-10 h-10 bg-red-50 text-red-500 rounded-xl flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity hover:bg-red-500 hover:text-white">
                <lucide-icon [name]="Trash2" size="18"></lucide-icon>
            </button>
        </div>

        <div *ngIf="trustees.length === 0 && !showForm"
            class="md:col-span-2 text-center p-12 text-gray-400 font-bold italic bg-white rounded-[24px] border border-gray-100">
            No trustees found. Add one to get started.
        </div>
    </div>
</div>
