<div class="animate-fade-in">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl font-bold">News & Gallery</h2>
        <button (click)="showForm = !showForm" class="btn-primary shadow-xl shadow-primary/20">
            <lucide-icon [name]="Plus" size="20"></lucide-icon>
            Post Item
        </button>
    </div>

    <!-- Add News Form -->
    <div *ngIf="showForm" class="bg-white rounded-[24px] p-8 shadow-sm border border-gray-100 mb-8 animate-fade-in">
        <h3 class="text-xl font-bold mb-6">Create Post</h3>
        <form (ngSubmit)="addNews()" #newsForm="ngForm" class="space-y-6">
            <div class="grid gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Title /
                        Headline</label>
                    <input type="text" [(ngModel)]="newItem.title" name="title" required
                        class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 focus:border-primary outline-none transition-all">
                </div>
                <div>
                    <label
                        class="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Description</label>
                    <textarea [(ngModel)]="newItem.description" name="description" rows="3" required
                        class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 focus:border-primary outline-none transition-all"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Image
                        URL</label>
                    <div class="relative group">
                        <div
                            class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-primary">
                            <lucide-icon [name]="Image" size="20"></lucide-icon>
                        </div>
                        <input type="url" [(ngModel)]="newItem.imageUrl" name="imageUrl"
                            placeholder="https://content.example.com/image.jpg"
                            class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 pl-12 focus:border-primary outline-none transition-all">
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-4 mt-8">
                <button type="button" (click)="showForm = false" class="btn-outline">Cancel</button>
                <button type="submit" [disabled]="!newsForm.valid" class="btn-primary">Publish</button>
            </div>
        </form>
    </div>

    <!-- News Grid -->
    <div class="grid md:grid-cols-3 gap-8">
        <div *ngFor="let n of newsItems"
            class="bg-white rounded-[24px] overflow-hidden shadow-sm border border-gray-100 group">
            <div class="h-48 bg-gray-100 overflow-hidden relative">
                <img *ngIf="n.imageUrl" [src]="n.imageUrl"
                    class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                <div *ngIf="!n.imageUrl" class="w-full h-full flex items-center justify-center text-gray-400">
                    <lucide-icon [name]="Image" size="40" class="opacity-20"></lucide-icon>
                </div>
            </div>
            <div class="p-6">
                <div class="text-xs font-bold text-primary mb-2 uppercase tracking-widest">{{n.createdAt | date}}</div>
                <h3 class="text-xl font-bold text-gray-900 mb-2">{{n.title}}</h3>
                <p class="text-gray-500 text-sm line-clamp-3">{{n.description}}</p>
            </div>
        </div>

        <div *ngIf="newsItems.length === 0 && !showForm"
            class="md:col-span-3 text-center p-12 text-gray-400 font-bold italic bg-white rounded-[24px] border border-gray-100">
            No items posted yet.
        </div>
    </div>
</div>
