<div class="animate-fade-in">
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl font-bold">News & Gallery</h2>
        <button (click)="showForm = !showForm; editingItem = null" class="btn-primary shadow-xl shadow-primary/20">
            <lucide-icon [name]="Plus" size="20"></lucide-icon>
            Post Item
        </button>
    </div>

    <!-- Add News Form -->
    <div *ngIf="showForm && !editingItem" class="bg-white rounded-[24px] p-8 shadow-sm border border-gray-100 mb-8 animate-fade-in">
        <h3 class="text-xl font-bold mb-6">Create Post</h3>
        <form (ngSubmit)="addNews()" #newsForm="ngForm" class="space-y-6">
            <div class="grid gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Title /
                        Headline</label>
                    <input type="text" [(ngModel)]="newItem.title" name="title" required
                        class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 focus:border-primary outline-none transition-all">
                </div>
                <div>
                    <label
                        class="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Description</label>
                    <textarea [(ngModel)]="newItem.description" name="description" rows="3" required
                        class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 focus:border-primary outline-none transition-all"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Image</label>
                    <div class="flex items-start gap-6">
                        <label
                            class="flex flex-col items-center justify-center w-32 h-32 rounded-2xl border-2 border-dashed border-gray-200 cursor-pointer hover:border-primary transition-colors bg-gray-50 overflow-hidden flex-shrink-0">
                            <img *ngIf="imagePreviewUrl" [src]="imagePreviewUrl" class="w-full h-full object-cover">
                            <span *ngIf="!imagePreviewUrl" class="flex flex-col items-center gap-1 text-gray-400">
                                <lucide-icon [name]="Upload" size="24"></lucide-icon>
                                <span class="text-xs font-bold">Upload</span>
                            </span>
                            <input type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)">
                        </label>
                        <div class="flex-grow">
                            <p class="text-sm text-gray-500 mb-2">Upload from device <span class="text-gray-400">— or —</span></p>
                            <input type="url" [(ngModel)]="newItem.imageUrl" name="imageUrl"
                                placeholder="https://content.example.com/image.jpg" [disabled]="!!selectedFile"
                                class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 focus:border-primary outline-none transition-all text-sm disabled:opacity-40">
                            <p *ngIf="selectedFile" class="mt-1 text-xs text-primary font-semibold">{{ selectedFile.name }}</p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-4 mt-8">
                <button type="button" (click)="showForm = false; selectedFile = null; imagePreviewUrl = null" class="btn-outline">Cancel</button>
                <button type="submit" [disabled]="!newsForm.valid || isUploading" class="btn-primary flex items-center gap-2">
                    <lucide-icon *ngIf="isUploading" [name]="Loader" size="18" class="animate-spin"></lucide-icon>
                    {{ isUploading ? 'Publishing…' : 'Publish' }}
                </button>
            </div>
        </form>
    </div>

    <!-- Edit News Form -->
    <div *ngIf="editingItem" class="bg-white rounded-[24px] p-8 shadow-sm border border-primary/30 mb-8 animate-fade-in">
        <h3 class="text-xl font-bold mb-6">Edit Post</h3>
        <div class="grid gap-6">
            <div>
                <label class="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Title / Headline</label>
                <input type="text" [(ngModel)]="editingItem.title" name="edit-title"
                    class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 focus:border-primary outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Description</label>
                <textarea [(ngModel)]="editingItem.description" name="edit-description" rows="3"
                    class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-4 focus:border-primary outline-none transition-all"></textarea>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Image</label>
                <div class="flex items-start gap-6">
                    <label
                        class="flex flex-col items-center justify-center w-32 h-32 rounded-2xl border-2 border-dashed border-gray-200 cursor-pointer hover:border-primary transition-colors bg-gray-50 overflow-hidden flex-shrink-0">
                        <img *ngIf="editPreviewUrl || editingItem.imageUrl" [src]="editPreviewUrl || editingItem.imageUrl" class="w-full h-full object-cover">
                        <span *ngIf="!editPreviewUrl && !editingItem.imageUrl" class="flex flex-col items-center gap-1 text-gray-400">
                            <lucide-icon [name]="Upload" size="24"></lucide-icon>
                            <span class="text-xs font-bold">Change</span>
                        </span>
                        <input type="file" accept="image/*" class="hidden" (change)="onEditFileSelected($event)">
                    </label>
                    <div class="flex-grow">
                        <p class="text-sm text-gray-500 mb-2">Upload new image <span class="text-gray-400">— or —</span></p>
                        <input type="url" [(ngModel)]="editingItem.imageUrl" name="edit-imageUrl" [disabled]="!!editFile"
                            placeholder="https://content.example.com/image.jpg"
                            class="w-full bg-gray-50 border-2 border-gray-100 rounded-2xl p-3 focus:border-primary outline-none transition-all text-sm disabled:opacity-40">
                        <p *ngIf="editFile" class="mt-1 text-xs text-primary font-semibold">{{ editFile.name }}</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="flex justify-end gap-4 mt-8">
            <button type="button" (click)="cancelEdit()" class="btn-outline">Cancel</button>
            <button type="button" (click)="saveEdit()" [disabled]="isUploading" class="btn-primary flex items-center gap-2">
                <lucide-icon *ngIf="isUploading" [name]="Loader" size="18" class="animate-spin"></lucide-icon>
                {{ isUploading ? 'Saving…' : 'Save Changes' }}
            </button>
        </div>
    </div>

    <!-- News Grid -->
    <div class="grid md:grid-cols-3 gap-8">
        <div *ngFor="let n of newsItems"
            class="bg-white rounded-[24px] overflow-hidden shadow-sm border border-gray-100 group">
            <div class="h-48 bg-gray-100 overflow-hidden relative">
                <img *ngIf="n.imageUrl" [src]="n.imageUrl"
                    class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                <div *ngIf="!n.imageUrl" class="w-full h-full flex items-center justify-center text-gray-400">
                    <lucide-icon [name]="Image" size="40" class="opacity-20"></lucide-icon>
                </div>
            </div>
            <div class="p-6">
                <div class="flex items-start justify-between gap-4 mb-2">
                    <div class="text-xs font-bold text-primary uppercase tracking-widest">{{n.createdAt | date}}</div>
                    <div class="inline-flex items-center gap-2">
                        <button type="button" (click)="editNews(n)"
                            class="inline-flex items-center gap-2 rounded-xl border border-blue-100 px-3 py-2 text-xs font-bold uppercase tracking-widest text-blue-500 hover:bg-blue-50">
                            <lucide-icon [name]="Edit" size="16"></lucide-icon>
                            Edit
                        </button>
                        <button type="button" (click)="deleteNews(n.id)"
                            class="inline-flex items-center gap-2 rounded-xl border border-red-100 px-3 py-2 text-xs font-bold uppercase tracking-widest text-red-500 hover:bg-red-50">
                            <lucide-icon [name]="Trash2" size="16"></lucide-icon>
                            Delete
                        </button>
                    </div>
                </div>
                <h3 class="text-xl font-bold text-gray-900 mb-2">{{n.title}}</h3>
                <p class="text-gray-500 text-sm line-clamp-3">{{n.description}}</p>
            </div>
        </div>

        <div *ngIf="newsItems.length === 0 && !showForm && !editingItem"
            class="md:col-span-3 text-center p-12 text-gray-400 font-bold italic bg-white rounded-[24px] border border-gray-100">
            No items posted yet.
        </div>
    </div>
</div>
