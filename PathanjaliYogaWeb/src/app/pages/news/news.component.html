<section class="pt-10 pb-24 bg-background">
    <div class="container mx-auto px-4">
        <div class="mb-16 h-[280px] md:h-[320px] rounded-3xl overflow-hidden shadow-xl relative">
            <img src="https://www.sripathanjalitrust.com/api/uploads/others/news_and_events_banner.jpeg"
                alt="News and Events Banner" class="w-full h-full object-cover object-center">
            <div class="absolute inset-0 bg-black/35 flex items-end justify-center text-center px-4 pb-6 md:pb-8">
                <p class="font-display italic text-white/95 max-w-s text-xl md:text-3xl tracking-wide drop-shadow-lg">
                    Stay updated on our latest activities and upcoming yoga sessions.</p>
            </div>
        </div>

        <!-- News List -->
        <div class="grid gap-8">
            <div *ngFor="let item of newsItems"
                class="bg-white rounded-3xl p-8 shadow-sm border border-gray-100 hover:shadow-md transition-shadow group">
                <div class="flex flex-col md:flex-row gap-8 items-start">
                    <div *ngIf="item.imageUrl" class="w-full md:w-72 overflow-hidden rounded-3xl bg-gray-100 shrink-0">
                        <img [src]="item.imageUrl" [alt]="item.title"
                            class="h-56 w-full object-cover transition-transform duration-500 group-hover:scale-105">
                    </div>
                    <div class="flex-1">
                        <div class="flex gap-4 mb-4">
                            <span
                                class="px-3 py-1 bg-primary/10 text-primary rounded-full text-xs font-bold uppercase tracking-wider">{{item.isEvent
                                ? 'Event' : 'News'}}</span>
                            <div class="flex items-center gap-2 text-gray-400 text-sm">
                                <lucide-icon [name]="Calendar" size="14"></lucide-icon>
                                {{item.date | date:'MMM dd, yyyy'}}
                            </div>
                            <div *ngIf="item.location" class="flex items-center gap-2 text-gray-400 text-sm">
                                <lucide-icon [name]="MapPin" size="14"></lucide-icon>
                                {{item.location}}
                            </div>
                        </div>
                        <h3 class="text-2xl font-bold mb-4">{{item.title}}</h3>
                        <p class="text-gray-600 leading-relaxed mb-6">{{item.content}}</p>
                        <a routerLink="/contact"
                            class="flex items-center gap-2 text-primary font-bold group-hover:translate-x-2 transition-transform">
                            Learn More <lucide-icon [name]="ArrowRight" size="14"></lucide-icon>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
