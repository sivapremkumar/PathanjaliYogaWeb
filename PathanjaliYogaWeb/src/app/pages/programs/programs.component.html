<section class="pt-10 pb-24 bg-background">
    <div class="container mx-auto px-4">
        <div class="mb-24 h-[280px] md:h-[320px] rounded-3xl overflow-hidden shadow-xl relative">
            <img src="https://www.sripathanjalitrust.com/api/uploads/others/programs_banner.jpg"
                alt="Our Programs Banner" class="w-full h-full object-cover object-center">
            <div class="absolute inset-0 bg-black/35 flex flex-col items-center justify-center text-center px-4">
                <h1 class="text-4xl md:text-6xl font-bold text-white mb-4">Our Programs</h1>
                <p class="text-lg md:text-xl text-white/90 leading-relaxed max-w-3xl">Join us in achieving holistic
                    health and supporting our welfare initiatives in Sankarankoil.</p>
            </div>
        </div>

        <!-- Programs Grid -->
        <div class="grid md:grid-cols-3 gap-12">
            <div *ngFor="let program of programs"
                class="bg-white rounded-[40px] overflow-hidden shadow-xl shadow-primary/5 hover:shadow-primary/10 transition-shadow border border-gray-100 group">
                <div class="relative h-64 overflow-hidden">
                    <div
                        class="absolute inset-0 bg-primary/20 z-10 opacity-0 group-hover:opacity-100 transition-opacity">
                    </div>
                    <img [src]="program.image"
                        class="w-full h-full object-cover transition-transform group-hover:scale-110">
                    <div class="absolute top-6 left-6 z-20">
                        <span
                            class="px-4 py-1.5 rounded-full bg-white/90 text-primary text-xs font-bold tracking-widest uppercase backdrop-blur-md">{{program.type}}</span>
                    </div>
                </div>
                <div class="p-10">
                    <h3 class="text-2xl font-bold text-gray-900 mb-4">{{program.title}}</h3>
                    <p class="text-gray-500 mb-8 leading-relaxed">{{program.description}}</p>

                    <div class="flex items-center gap-4 py-6 border-t border-gray-100 mb-8">
                        <div
                            class="w-10 h-10 bg-secondary/20 text-primary rounded-full flex items-center justify-center shrink-0">
                            <lucide-icon [name]="Calendar" size="18"></lucide-icon>
                        </div>
                        <div>
                            <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Schedule</p>
                            <p class="font-bold text-gray-900 leading-none">{{program.schedule}}</p>
                        </div>
                    </div>

                    <a routerLink="/contact" class="btn-primary w-full justify-center">
                        Register Now
                        <lucide-icon [name]="ArrowRight" size="14"></lucide-icon>
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
